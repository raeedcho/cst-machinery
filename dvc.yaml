      - ${dir_structure.results_dir}/movement-kinematics/${item.dataset_name}/${item.dataset_name}_hand-movements.svg
      - ${dir_structure.results_dir}/movement-kinematics/${item.dataset_name}/${item.dataset_name}_rtt-target-onset-kinematics.svg
  neural_explained_variance:
    foreach: ${datasets}
    do:
      cmd: python scripts/neural_explained_variance.py --dataset ${item.dataset_name} 
        --composition_config ${dir_structure.config_dir}/trialframe_cst.yaml
        ${dir_structure} ${logging} ${neural_explained_variance}
      params:
      - logging
      - dir_structure
      - neural_explained_variance
      - conf/trialframe_cst.yaml:
      deps:
      - scripts/neural_explained_variance.py
      - src/cli.py
      - src/io.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/munge.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/time_slice.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/state_space.py
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${info}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_targets.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.state}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.hand position}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.motor cortex}.parquet
