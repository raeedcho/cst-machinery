      - ${dir_structure.results_dir}/neural-explained-variance/${item.dataset_name}/${item.dataset_name}_neural-explained-variance-curves.svg
      - ${dir_structure.results_dir}/neural-explained-variance/${item.dataset_name}/${item.dataset_name}_neural-explained-variance-95pct-dims.csv
  context_axis:
