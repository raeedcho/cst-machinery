vars:
  - params.yaml
  - conf/trialframe.yaml
  - conf/lfads/lfads-torch.yaml

stages:
  extract:
    foreach: ${datasets}
    do:
      cmd: python scripts/extract_normalized_data.py --dataset ${item.dataset_name} ${dir_structure} ${logging} ${extract}
      params:
      - extract
      - logging
      - dir_structure
      deps:
      - scripts/extract_normalized_data.py
      - ${dir_structure.raw_data_dir}/${item.monkey}/${item.date}/
      - /Users/raeed/codebase/0-projects/smile-extraction/smile_extract
      outs:
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_meta.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_targets.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_states.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_hand-pos.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_cst-cursor-pos.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_neural-spikes-binned.parquet
      - ${dir_structure.log_dir}/extract/${item.dataset_name}.log
  smooth_firing_rates:
    foreach: ${datasets}
    do:
      cmd: python scripts/smooth_firing_rates.py --dataset ${item.dataset_name} ${dir_structure} ${logging} ${smooth_firing_rates}
      params:
      - logging
      - dir_structure
      - smooth_firing_rates
      deps:
      - scripts/smooth_firing_rates.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/munge.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/smoothing.py
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_neural-spikes-binned.parquet
      outs:
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_neural-smooth-rates.parquet
      - ${dir_structure.log_dir}/smooth-firing-rates/${item.dataset_name}.log
  prep_lfads_tensors:
    foreach: ${datasets}
    do:
      cmd: python scripts/prep_lfads_tensors.py 
        ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_neural-spikes-binned.parquet
        --out ${dir_structure.pre-lfads_dir}/${item.dataset_name}_tensors.hdf5
        --info_path ${dir_structure.config_dir}/lfads/dataset_info/${item.dataset_name}.yaml
        ${logging} ${prep_lfads_tensors} ${dir_structure}
      params:
      - prep_lfads_tensors
      - logging
      - dir_structure
      deps:
      - scripts/prep_lfads_tensors.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/munge.py
      - src/chop_merge.py
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_neural-spikes-binned.parquet
      outs:
      - ${dir_structure.pre-lfads_dir}/${item.dataset_name}_tensors.hdf5
      - ${dir_structure.log_dir}/prep-lfads-tensors/${item.dataset_name}_tensors.log
  train_lfads:
    foreach: ${datasets}
    do:
      frozen: true
      cmd: python scripts/train_lfads.py
        --dataset ${item.dataset_name}
        --config ../${dir_structure.config_dir}/lfads/lfads-torch.yaml
        ${logging} ${dir_structure}
      params:
      - logging
      - dir_structure
      - conf/lfads/lfads-torch.yaml:
      - conf/lfads/dataset_info/${item.dataset_name}.yaml:
      - conf/lfads/callbacks/plots.yaml:
      - conf/lfads/datamodule/single_session_datamodule.yaml:
      - conf/lfads/model/single_session_model.yaml:
      deps:
      - scripts/train_lfads.py
      - src/lfads_dvc.py
      - src/lfads_callbacks.py
      - ${dir_structure.pre-lfads_dir}/${item.dataset_name}_tensors.hdf5
      - ${dir_structure.config_dir}/lfads
      outs:
      - ${dir_structure.log_dir}/train-lfads/${item.dataset_name}.log
      - ${dir_structure.results_dir}/lfads/${item.dataset_name}/lightning_checkpoints:
          persist: false
      - ${dir_structure.results_dir}/lfads/${item.dataset_name}/dvclive
      - ${dir_structure.results_dir}/lfads/${item.dataset_name}/lfads_model.pt
      - ${dir_structure.results_dir}/lfads/${item.dataset_name}/lfads_output_${item.dataset_name}_tensors.h5
  merge_lfads_outputs:
    foreach: ${datasets}
    do:
      cmd: python scripts/merge_lfads_outputs.py --dataset ${item.dataset_name} --overlap ${prep_lfads_tensors.overlap} ${merge_lfads_tensors} ${dir_structure} ${logging}
      params:
      - dir_structure
      - logging
      - prep_lfads_tensors.overlap
      - merge_lfads_tensors
      deps:
      - scripts/merge_lfads_outputs.py
      - src/chop_merge.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/munge.py
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_neural-spikes-binned.parquet
      - ${dir_structure.results_dir}/lfads/${item.dataset_name}/lfads_output_${item.dataset_name}_tensors.h5
      outs:
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_neural-lfads-rates.parquet
      - ${dir_structure.log_dir}/merge-lfads-outputs/${item.dataset_name}.log
  subspace_split:
    foreach: ${datasets}
    do:
      cmd: python scripts/subspace_split.py --dataset ${item.dataset_name} 
        --composition_config ${dir_structure.config_dir}/trialframe.yaml
        ${dir_structure} ${logging} ${subspace_split}
      params:
      - logging
      - dir_structure
      - subspace_split
      - conf/trialframe.yaml:
      deps:
      - scripts/subspace_split.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/munge.py
      - src/cli.py
      - src/io.py
      - src/crystal_models.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/time_slice.py
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${info}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.state}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.hand position}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.motor cortex}.parquet
      outs:
      - ${dir_structure.log_dir}/subspace-split/${item.dataset_name}.log
      - ${dir_structure.results_dir}/subspace-split/${item.dataset_name}/${item.dataset_name}_subspace-split-pipeline.pkl
      - ${dir_structure.results_dir}/subspace-split/${item.dataset_name}/${item.dataset_name}_subspace-split-variance.svg
  prep_move_split:
    foreach: ${prep_move_datasets}
    do:
      cmd: python scripts/prep_move_split.py --dataset ${item.dataset_name} 
        --composition_config ${dir_structure.config_dir}/trialframe_cst.yaml
        ${dir_structure} ${logging}
        --n_comps_per_cond ${prep_move_split.n_comps_per_cond}
        --var_cutoff ${prep_move_split.var_cutoff}
        --reference_task ${prep_move_split.reference_task}
        --prep_start=${prep_move_split.prep_start}
        --prep_end=${prep_move_split.prep_end}
        --move_start=${prep_move_split.move_start}
        --move_end=${prep_move_split.move_end}
      params:
      - logging
      - dir_structure
      - prep_move_split
      - conf/trialframe_cst.yaml:
      deps:
      - scripts/prep_move_split.py
      - src/cli.py
      - src/io.py
      - src/targets.py
      - src/crystal_models.py
      - src/subspace_tools.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/munge.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/time_slice.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/state_space.py
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${info}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_targets.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.state}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.hand position}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.motor cortex}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_cst-cursor-pos.parquet
      outs:
      - ${dir_structure.log_dir}/prep-move-split/${item.dataset_name}.log
      - ${dir_structure.results_dir}/prep-move-split/${item.dataset_name}/${item.dataset_name}_prep-move-partition.pkl
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_neural-partition-cis.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_neural-partition-move_unique.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_neural-partition-prep_unique.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_neural-partition-shared.parquet
  prep_move_split_plots:
    foreach: ${prep_move_datasets}
    do:
      cmd: python scripts/prep_move_split_plots.py --dataset ${item.dataset_name} 
        --composition_config ${dir_structure.config_dir}/trialframe_cst.yaml
        ${dir_structure} ${logging}
        --reference_task ${prep_move_split.reference_task}
        --prep_start=${prep_move_split.prep_start}
        --prep_end=${prep_move_split.prep_end}
        --move_start=${prep_move_split.move_start}
        --move_end=${prep_move_split.move_end}
        --target_onset_start=${prep_move_split_plots.target_onset_start}
        --target_onset_end=${prep_move_split_plots.target_onset_end}
        --proj_prep_start=${prep_move_split_plots.proj_prep_start}
        --proj_prep_end=${prep_move_split_plots.proj_prep_end}
        --proj_move_start=${prep_move_split_plots.proj_move_start}
        --proj_move_end=${prep_move_split_plots.proj_move_end}
        --all_trial_start=${prep_move_split_plots.all_trial_start}
        --all_trial_end=${prep_move_split_plots.all_trial_end}
      params:
      - logging
      - dir_structure
      - prep_move_split
      - prep_move_split_plots
      - conf/trialframe_cst.yaml:
      deps:
      - scripts/prep_move_split_plots.py
      - src/cli.py
      - src/io.py
      - src/plot.py
      - src/targets.py
      - src/crystal_models.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/munge.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/time_slice.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/state_space.py
      - ${dir_structure.results_dir}/prep-move-split/${item.dataset_name}/${item.dataset_name}_prep-move-partition.pkl
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${info}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_targets.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.state}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.hand position}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.motor cortex}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_cst-cursor-pos.parquet
      outs:
      - ${dir_structure.log_dir}/prep-move-split-plots/${item.dataset_name}.log
      - ${dir_structure.results_dir}/prep-move-split/${item.dataset_name}/${item.dataset_name}_split-space-trajectory.json
      plots:
      - ${dir_structure.results_dir}/prep-move-split/${item.dataset_name}/${item.dataset_name}_prep-move-variance.svg
      - ${dir_structure.results_dir}/prep-move-split/${item.dataset_name}/${item.dataset_name}_projected-activity-dco.svg
      - ${dir_structure.results_dir}/prep-move-split/${item.dataset_name}/${item.dataset_name}_projected-activity-all-tasks.svg
      - ${dir_structure.results_dir}/prep-move-split/${item.dataset_name}/${item.dataset_name}_projected-activity-rtt-target-onset.svg
  prep_move_split_svg:
    foreach: ${prep_move_datasets}
    do:
      cmd: python scripts/vegalite_to_svg.py
        --input ${dir_structure.results_dir}/prep-move-split/${item.dataset_name}/${item.dataset_name}_split-space-trajectory.json
        --output ${dir_structure.results_dir}/prep-move-split/${item.dataset_name}/${item.dataset_name}_split-space-trajectory.svg
      deps:
      - scripts/vegalite_to_svg.py
      - ${dir_structure.results_dir}/prep-move-split/${item.dataset_name}/${item.dataset_name}_split-space-trajectory.json
      plots:
      - ${dir_structure.results_dir}/prep-move-split/${item.dataset_name}/${item.dataset_name}_split-space-trajectory.svg
  movement_kinematics_plots:
    foreach: ${datasets}
    do:
      cmd: python scripts/movement_kinematics_plots.py --dataset ${item.dataset_name} 
        --composition_config ${dir_structure.config_dir}/trialframe_cst.yaml
        ${dir_structure} ${logging}
        --hand_trial_start=${movement_kinematics_plots.hand_trial_start}
        --hand_trial_end=${movement_kinematics_plots.hand_trial_end}
        --target_onset_start=${movement_kinematics_plots.target_onset_start}
        --target_onset_end=${movement_kinematics_plots.target_onset_end}
      params:
      - logging
      - dir_structure
      - movement_kinematics_plots
      - conf/trialframe_cst.yaml:
      deps:
      - scripts/movement_kinematics_plots.py
      - src/cli.py
      - src/io.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/munge.py
      - /Users/raeed/codebase/0-projects/trialframe/trialframe/time_slice.py
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${info}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_targets.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.state}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.hand position}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_${composition.motor cortex}.parquet
      - ${dir_structure.trialframe_dir}/${item.dataset_name}/${item.dataset_name}_cst-cursor-pos.parquet
      outs:
